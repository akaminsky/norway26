/* Register the service worker and auto-reload when a new deploy activates.
   This is what makes the home-screen (PWA) app pick up updates instead of
   showing a stale cached version. */
(function () {
  if (!('serviceWorker' in navigator)) return;
  var hadController = !!navigator.serviceWorker.controller;
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    // A new SW took control (new version). Reload once to run it — but not on the
    // very first install (when there was no controller yet), to avoid a needless reload.
    if (refreshing || !hadController) return;
    refreshing = true;
    location.reload();
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(function (reg) {
      reg.update();
      // Re-check for a new version whenever the app is reopened / refocused.
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update();
      });
    }).catch(function () {});
  });
})();
</script>

  };

  accent(){ return '#4ECDC4'; }
  // Index of today's day within the trip (Jul 15–28, 2026), clamped; isToday is
  // false before/after the trip.
  computeToday(){ try { const start=new Date(2026,6,15); const now=new Date(); const t=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const diff=Math.round((t-start)/864e5); const last=(this.DEFAULTS?this.DEFAULTS.length:14)-1; return {idx:Math.max(0,Math.min(last,diff)), isToday:(diff>=0&&diff<=last)}; } catch(e){ return {idx:0, isToday:false}; } }
  units(){ return (this.props && this.props.units) || 'km'; }

  typeKeyMap(){ if(!this._tm){ this._tm = {}; this.TYPES.forEach(t=>{ this._tm[t.key]=t; }); } return this._tm; }
  typeMeta(k){ return this.typeKeyMap()[k] || {label:'Activity', icon:'mapPin', fields:[]}; }
  inferType(a){
    if(a && a.type) return a.type;
    const map = {mountain:'hike',footprints:'hike',snowflake:'glacier',waves:'water',fish:'fishing',car:'scenic',ship:'ferry',tram:'train',zap:'adventure',utensils:'food',mapPin:'sightseeing',navigation:'logistics',bed:'lodging',tent:'lodging',droplet:'relax'};
    return (a && map[a.icon]) || 'sightseeing';
  }
  iconForAct(a){ return this.typeMeta(this.inferType(a)).icon; }

  wmo(code){
    const c = Number(code);
    if(c===0) return {key:'sun',label:'Clear'};
    if(c===1||c===2) return {key:'cloudsun',label:'Partly cloudy'};
    if(c===3) return {key:'cloud',label:'Overcast'};
    if(c===45||c===48) return {key:'cloud',label:'Fog'};
    if(c>=51&&c<=57) return {key:'cloudrain',label:'Drizzle'};
    if(c>=61&&c<=67) return {key:'cloudrain',label:'Rain'};
    if(c>=71&&c<=77) return {key:'cloud',label:'Snow'};
    if(c>=80&&c<=82) return {key:'cloudrain',label:'Rain showers'};
    if(c>=85&&c<=86) return {key:'cloudrain',label:'Snow showers'};
    if(c>=95) return {key:'cloudrain',label:'Thunderstorm'};
    return {key:'cloudsun',label:'Partly cloudy'};
  }
  weatherFor(d){
    const w = this.state.weather && this.state.weather[d.day];
    if(w && w.hi!=null) return w;
    const sk = this.SKY[d.sky] || this.SKY.cloudsun;
    return {hi:d.hi, lo:d.lo, sky:d.sky, label:sk.label, source:'typical'};
  }
  fetchWeather(){
    if(this._wxBusy) return; this._wxBusy = true;
    const days = this.DEFAULTS;
    const lats = days.map(d=>d.coord[0]).join(',');
    const lons = days.map(d=>d.coord[1]).join(',');
    const daily = 'temperature_2m_max,temperature_2m_min,weather_code';
    const tz = 'Europe%2FOslo';
    // Live forecast: ask for the max 16-day window (never a date-range error). Trip
    // days inside that window resolve to a real 2026 forecast; the window slides
    // forward each day, so more of the trip becomes "live" as it approaches.
    const fUrl = 'https://api.open-meteo.com/v1/forecast?latitude='+lats+'&longitude='+lons+'&daily='+daily+'&timezone='+tz+'&forecast_days=16';
    // Typical July: average several recent years for the same dates (one hot year
    // like 2025 is not representative), used only for days the forecast can't reach.
    const YEARS = [2021,2022,2023,2024];
    const aUrls = YEARS.map(yr=>'https://archive-api.open-meteo.com/v1/archive?latitude='+lats+'&longitude='+lons+'&daily='+daily+'&timezone='+tz+'&start_date='+yr+'-07-15&end_date='+yr+'-07-28');
    const grab = (url)=>fetch(url).then(r=>r.json()).then(j=>Array.isArray(j)?j:[j]).catch(()=>null);
    Promise.all([grab(fUrl)].concat(aUrls.map(grab))).then(res=>{
      this._wxBusy = false; this._wxLast = Date.now();
      const f = res[0], archives = res.slice(1);
      const out = {};
      // 1) Forecast wins where available.
      if(f){
        f.forEach((loc, i)=>{
          const day = days[i]; if(!day || !loc || !loc.daily || !loc.daily.time) return;
          const idx = loc.daily.time.indexOf('2026-07-'+String(14+day.day)); if(idx<0) return;
          const hi = loc.daily.temperature_2m_max[idx], lo = loc.daily.temperature_2m_min[idx], code = loc.daily.weather_code[idx];
          if(hi==null || lo==null) return;
          const w = this.wmo(code);
          out[day.day] = {hi:Math.round(hi), lo:Math.round(lo), sky:w.key, label:w.label, source:'forecast'};
        });
      }
      // 2) Multi-year average for the rest.
      const agg = {};
      archives.forEach((arr, yi)=>{
        if(!arr) return;
        arr.forEach((loc, i)=>{
          const day = days[i]; if(!day || !loc || !loc.daily || !loc.daily.time) return;
          const idx = loc.daily.time.indexOf(YEARS[yi]+'-07-'+String(14+day.day)); if(idx<0) return;
          const hi = loc.daily.temperature_2m_max[idx], lo = loc.daily.temperature_2m_min[idx], code = loc.daily.weather_code[idx];
          if(hi==null || lo==null) return;
          const a = agg[day.day] || (agg[day.day] = {hi:[], lo:[], codes:[]});
          a.hi.push(hi); a.lo.push(lo); a.codes.push(code);
        });
      });
      const mean = xs => xs.reduce((s,x)=>s+x,0)/xs.length;
      const mode = xs => { const m={}; let best=xs[0], bc=0; xs.forEach(x=>{ m[x]=(m[x]||0)+1; if(m[x]>bc){ bc=m[x]; best=x; } }); return best; };
      Object.keys(agg).forEach(dnum=>{
        if(out[dnum]) return;
        const a = agg[dnum], w = this.wmo(mode(a.codes));
        out[dnum] = {hi:Math.round(mean(a.hi)), lo:Math.round(mean(a.lo)), sky:w.key, label:w.label, source:'typical'};
      });
      if(Object.keys(out).length){
        try { localStorage.setItem(this.WKEY, JSON.stringify({t:Date.now(), data:out})); } catch(_){}
        this.setState({weather:out});
      }
    }).catch(()=>{ this._wxBusy = false; });
  }

  // EUR→NOK: live ECB reference rate (frankfurter.app, keyless), cached in
  // localStorage; ~11.6 as a sane fallback until the first successful fetch.
  fxRate(){ return (this.state.fx && this.state.fx.rate) || 11.6; }
  fetchFx(){
    if(this._fxBusy) return;
    if(this._fxLast && Date.now()-this._fxLast < 6e5) return;
    this._fxBusy = true;
    fetch('https://api.frankfurter.app/latest?from=EUR&to=NOK')
      .then(r=>r.json())
      .then(j=>{
        this._fxBusy = false;
        const rate = j && j.rates && Number(j.rates.NOK);
        if(!rate || !isFinite(rate)) return;
        this._fxLast = Date.now();
        const fx = {rate, t:Date.now()};
        try { localStorage.setItem(this.FXKEY, JSON.stringify(fx)); } catch(_){}
        this.setState({fx});
      })
      .catch(()=>{ this._fxBusy = false; });
  }
  openInfo = ()=>this.setState({infoOpen:true});
  closeInfo = ()=>this.setState({infoOpen:false});
  onFxEur = (e)=>this.setState({fxAmt:e.target.value, fxSide:'eur'});

  }
  iconEl(name, size){
    return React.createElement('span', {style:{display:'inline-flex',alignItems:'center'}, dangerouslySetInnerHTML:{__html:this.iconSvg(name, size||18)}});

  fmtKm(km){ if(this.units()==='mi') return Math.round(km*0.6214)+' mi'; return Math.round(km)+' km'; }
  distKm(a, b){
    const R=6371, toR=x=>x*Math.PI/180;
    const dLat=toR(b[0]-a[0]), dLon=toR(b[1]-a[1]);
    const s=Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toR(a[0]))*Math.cos(toR(b[0]))*Math.sin(dLon/2)*Math.sin(dLon/2);
    return 2*R*Math.asin(Math.sqrt(s));
  }

  // Live "you are here": watch the device position, keep a pulsing blue dot +
  // accuracy circle on the map. Marker moves are imperative (cheap, every GPS
  // tick); React state only updates every few seconds for the distance chip.
  startGeo(){
    if(this._geoWatch!=null || !('geolocation' in navigator)) return;
    try {
      this._geoWatch = navigator.geolocation.watchPosition(
        p=>this.onGeoFix(p),
        ()=>{},
        {enableHighAccuracy:true, maximumAge:5000, timeout:30000}
      );
    } catch(_){}
  }
  onGeoFix(p){
    const c=[p.coords.latitude, p.coords.longitude], acc=p.coords.accuracy||0;
    this._pos = {c, acc};
    this.updateMeMarker(c, acc);
    const now=Date.now();
    if(!this._posT || now-this._posT>5000){ this._posT=now; this.setState({pos:{c, acc}}); }
    if(this._centerOnFix){ this._centerOnFix=false; if(this.map) this.map.flyTo(c, Math.max(this.map.getZoom(), 11), {duration:.8}); }
  }
  updateMeMarker(c, acc){
    if(!this.map || !window.L) return;
    const L = window.L;
    if(!this.meMarker){
      const icon = L.divIcon({html:'<div class="np-me"></div>', className:'', iconSize:[15,15], iconAnchor:[7.5,7.5]});
      this.meMarker = L.marker(c, {icon, zIndexOffset:1500, interactive:false}).addTo(this.map);
      this.meCircle = L.circle(c, {radius:acc, color:'#4A90E2', weight:1, opacity:.3, fillColor:'#4A90E2', fillOpacity:.08, interactive:false}).addTo(this.map);

  onLocate = ()=>{

  mapQuery(text){
    let t = String(text||'');
    t = t.replace(/^optional:\s*/i,'').replace(/^hike\s+/i,'').replace(/^glacier hike on\s+/i,'').replace(/^drive day\s*[—–-]\s*/i,'').replace(/\brestock in\s+/i,'').replace(/\s+if time allows$/i,'').replace(/\s*\(.*?\)\s*$/,'').replace(/\s+[—–]\s+.*$/,'').split(/\s\+\s/)[0].trim();

  }
  parseCoord(s){
    const m = s.match(/@(-?\d+\.\d+),\s*(-?\d+\.\d+)/) || s.match(/[?&]query=(-?\d+\.\d+),\s*(-?\d+\.\d+)/) || s.match(/(-?\d{1,2}\.\d{3,}),\s*(-?\d{1,3}\.\d{3,})/);

  shortName(dn){ return String(dn).split(',').slice(0,2).map(x=>x.trim()).join(', '); }

  clearPlace(idx){ this.setAct(idx, 'coord', null); this.setAct(idx, 'place', ''); }
  doFind(idx, fallback){
    const g = this.state.geo[idx] || {};

    q = q.trim(); if(!q) return;
    const c = this.parseCoord(q);
    if(c){ this.attachPlace(idx, c[0], c[1], 'Pinned · '+c[0].toFixed(4)+', '+c[1].toFixed(4)); return; }

      .then(r=>r.json())
      .then(j=>{ this.setGeo(idx, {loading:false, results:(j||[]).map(r=>({lat:+r.lat, lon:+r.lon, name:this.shortName(r.display_name)}))}); })

  }
  refreshActivityMarkers(){
    if(!this.map || !window.L) return;
    const L = window.L;
    if(!this.actLayer) this.actLayer = L.layerGroup().addTo(this.map);
    this.actLayer.clearLayers();
    this.actMarkers = [];
    this.mergedDays().forEach(d=>{
      (d.activities||[]).forEach(a=>{
        if(a.coord && a.coord.length===2){
          const html = '<div class="np-pin"><div class="np-pin-dot" style="width:26px;height:26px;background:'+this.ACT_COLOR+';color:#08141a;">'+this.iconSvg(this.iconForAct(a),13)+'</div></div>';
          const icon = L.divIcon({html, className:'', iconSize:[28,28], iconAnchor:[14,14], tooltipAnchor:[0,-13]});
          const m = L.marker(a.coord, {icon}).addTo(this.actLayer);
          m.bindPopup(this.pinCard(a.text||'Activity', [d.day], 'activity'), {className:'np-pop', closeButton:false, offset:[0,-2], autoPanPaddingTopLeft:[18,180], autoPanPaddingBottomRight:[18,110]});

    });

    this.updateTodayHighlight();
  }

  // Hide/show pins by kind and by "today only". Uses inline display so we don't
  // have to swap Leaflet layers.
  applyFilters(){
    if(!this.markers) return;
    const s = this.state;
    const tdy = this.computeToday();
    const todayDay = tdy.idx + 1;
    const apply = (o, kindOn, days) => {
      const el = o.m.getElement();
      if(!el) return;
      let visible = kindOn;
      if(visible && s.todayOnly){
        visible = days.indexOf(todayDay) >= 0;
      }
      el.style.display = visible ? '' : 'none';
    };
    // PLACES pins carry their kind (teal stays vs orange activities); user-added
    // activity pins live in actMarkers and are always orange.
    this.markers.forEach(o => apply(o, o.kind==='stay' ? s.showStays : s.showActivities, o.days));

  // Give today's pin(s) a slightly larger halo and a higher z-index so they're
  // never hidden under a neighbor.
  updateTodayHighlight(){
    const tdy = this.computeToday();
    const td = tdy.isToday ? (tdy.idx + 1) : -1;
    const tag = (arr, matches) => (arr||[]).forEach(o => {
      const on = matches(o);
      // Leaflet stacks markers by their wrapper element, so raising the inner
      // div's z-index isn't enough — bump the marker's own z-index offset.
      o.m.setZIndexOffset(on ? 1000 : 0);

      const pin = el.querySelector('.np-pin'); if(!pin) return;

    tag(this.actMarkers, o => o.day === td);
  }
  toggleStays = () => this.setState(s => ({showStays: !s.showStays}));
  toggleActivities = () => this.setState(s => ({showActivities: !s.showActivities}));
  toggleTodayOnly = () => this.setState(s => ({todayOnly: !s.todayOnly}));

  mergedDays(){
    const ov = this.state.overrides || {};
    return this.DEFAULTS.map(d=>{
      const o = ov[d.day] || {};
      const m = Object.assign({}, d, o);
      m.activities = (o.activities || d.activities).map(a=>Object.assign({}, a, {type:this.inferType(a)}));
      m.photos = o.photos || [];
      m.tripLog = (o.tripLog!=null) ? o.tripLog : '';
      m.modified = this.planSig(m) !== this.planSig(Object.assign({}, d, {activities:d.activities.map(a=>Object.assign({}, a, {type:this.inferType(a)}))}));
      return m;
    });
  }
  planSig(d){
    return JSON.stringify({f:d.from,t:d.to,dt:d.drivingTime,dk:d.drivingKm,fe:!!d.ferry,ac:d.accommodation,st:d.status,no:d.notes,me:d.meals?[d.meals.b||'',d.meals.l||'',d.meals.d||'']:[],acts:(d.activities||[]).map(a=>[a.text,a.type||'',a.desc||'',a.hikeKm||0,a.time||''])});
  }

  componentDidMount(){
    this._onUp = ()=>{ this.setState({online:true}); this.fetchWeather(); this.fetchFx(); };

    window.addEventListener('offline', this._onDown);
    // Refresh the forecast when the app is refocused (e.g. reopened from the
    // home screen) if it's been a few minutes, so weather stays current.
    this._onVis = ()=>{ if(document.visibilityState!=='visible' || !navigator.onLine) return; if(!this._wxLast || Date.now()-this._wxLast > 6e5) this.fetchWeather(); this.fetchFx(); };

    if(this.state.online){ this.fetchWeather(); this.fetchFx(); }
    this._onKey = (e)=>{

      const tag = (e.target && e.target.tagName || '').toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select') return;
      const i = this.state.detailDay;
      if(e.key==='ArrowRight' && i < this.DEFAULTS.length-1) this.openDetail(i+1);
      else if(e.key==='ArrowLeft' && i > 0) this.openDetail(i-1);

  componentWillUnmount(){

  componentDidUpdate(){

      this._prevSel = this.state.selectedIndex;
      this.flyToDay(this.state.selectedIndex);
      this.updateActive();
      this.centerStrip();
    }
    if(this._prevSheet !== this.state.sheetMode){
      const wasNotFull = this._prevSheet !== 'full';
      this._prevSheet = this.state.sheetMode;
      this.applySheet(this.state.sheetMode, true);
      if(this.state.sheetMode==='full' && wasNotFull) requestAnimationFrame(()=>this.scrollListToToday());
      setTimeout(()=>{ if(this.map) this.map.invalidateSize(); }, 460);
    }
    if(this._ovRef !== this.state.overrides){
      this._ovRef = this.state.overrides;
      this.refreshActivityMarkers();
    }
    const fsig = this.state.showStays + '|' + this.state.showActivities + '|' + this.state.todayOnly;
    if(this._prevFilter !== fsig){

      this.applyFilters();
    }
  }

  waitForL(cb, n){ n=n||0; if(window.L) return cb(); if(n>80) return; setTimeout(()=>this.waitForL(cb, n+1), 60); }
  initMap(){
    if(this.map) return;
    const L = window.L;
    const el = document.getElementById('np-map'); if(!el) return;
    const map = L.map(el, {zoomControl:false, attributionControl:true, scrollWheelZoom:true}).setView([61.4,7.4], 7);
    this.map = map;
    this.tileSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:17, attribution:'Esri, Maxar'});

    this.tileStreet = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {maxZoom:19, subdomains:'abcd', attribution:'© OpenStreetMap © CARTO'});
    this.tileLayers = {satellite:this.tileSat, terrain:this.tileTerr, street:this.tileStreet};
    (this.tileLayers[this.state.mapStyle] || this.tileSat).addTo(map);
    this.buildRoute(L, map);
    this.buildMarkers(L, map);
    this.refreshActivityMarkers();
    this._ovRef = this.state.overrides;
    // If the trip is underway, open on today's stop; otherwise show the whole route.
    const tdy = this.computeToday();
    const dd = tdy.isToday ? this.DEFAULTS[tdy.idx] : null;
    if(dd && dd.onMap !== false){
      const z = (tdy.idx === 12) ? 6.2 : 9.2;
      map.setView(dd.coord, z);
    } else {
      const b = L.latLngBounds(this.ROUTE);
      map.fitBounds(b, {paddingTopLeft:[26,170], paddingBottomRight:[26,96]});
    }
    setTimeout(()=>map.invalidateSize(), 280);
    setTimeout(()=>{ this.updateActive(); this.updateTodayHighlight(); this.applyFilters(); }, 350);
    this.startGeo();
  }
  buildRoute(L, map){
    const R = this.ROUTE, ac = this.accent();
    for(let i=1;i<R.length;i++){ L.polyline([R[i-1],R[i]], {color:'#04101a', weight:8, opacity:.5, lineCap:'round'}).addTo(map); }
    for(let i=1;i<R.length;i++){ L.polyline([R[i-1],R[i]], {color:ac, weight:4, opacity:.95, lineCap:'round'}).addTo(map); }
  }
  buildMarkers(L, map){
    this.markers = [];
    this.PLACES.forEach(p=>{
      const isStay = p.kind==='stay';
      const color = isStay ? this.STAY_COLOR : this.ACT_COLOR;
      const label = p.days.length>1 ? (p.days[0]+'–'+p.days[p.days.length-1]) : String(p.days[0]);
      const size = isStay ? 32 : 27;
      const fs = (label.length>2 ? (isStay?12:10.5) : (isStay?15:12.5));
      const html = '<div class="np-pin"><div class="np-pin-dot" style="width:'+size+'px;height:'+size+'px;background:'+color+';font-family:\'Space Grotesk\',sans-serif;font-weight:700;font-size:'+fs+'px;color:#08141a;">'+label+'</div></div>';
      const icon = L.divIcon({html, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2], tooltipAnchor:[0,-(size/2+1)], popupAnchor:[0,-(size/2)]});
      const m = L.marker(p.c, {icon}).addTo(map);
      // Every pin → a peek card next to it; tap the card to open the full day.
      m.bindPopup(this.pinCard(p.n, p.days, p.kind), {className:'np-pop', closeButton:false, offset:[0,-2], autoPanPaddingTopLeft:[18,180], autoPanPaddingBottomRight:[18,110]});
      this.markers.push({m, days:p.days, kind:p.kind});
    });
  }
  pinCard(name, days, kind){
    const first = this.DEFAULTS[days[0]-1], last = this.DEFAULTS[days[days.length-1]-1];
    let label;
    if(kind==='stay'){
      const dr = days.length>1 ? ((first?first.date:'') + '–' + (last?last.date.split(' ').pop():'')) : (first?first.date:'');
      label = (days.length>1 ? ('Nights '+days[0]+'–'+days[days.length-1]) : ('Night '+days[0])) + (dr?(' · '+dr):'');
    } else {
      label = 'Day ' + days[0] + (first?(' · '+first.date):'');
    }
    const el = document.createElement('div');
    el.className = 'np-actcard';
    el.innerHTML = '<div class="np-actcard-day"></div><div class="np-actcard-title"></div><div class="np-actcard-cta">See the full day →</div>';
    const dayEl = el.querySelector('.np-actcard-day');
    dayEl.textContent = label;
    dayEl.style.color = kind==='stay' ? '#7fe0d8' : '#F2A54E';
    el.querySelector('.np-actcard-title').textContent = name;
    el.addEventListener('click', ()=>{ if(this.map) this.map.closePopup(); this.openDetail(days[0]-1); });

  }
  setStyle(s){
    if(!this.map || !this.tileLayers || !this.tileLayers[s]) return;
    Object.keys(this.tileLayers).forEach(k=>{ if(k!==s && this.map.hasLayer(this.tileLayers[k])) this.map.removeLayer(this.tileLayers[k]); });
    if(!this.map.hasLayer(this.tileLayers[s])) this.tileLayers[s].addTo(this.map);

    this.setState({mapStyle:s});
  }
  flyToDay(i){ if(!this.map) return; const d = this.DEFAULTS[i]; if(!d || d.onMap===false) return; const z = (i===12) ? 6.2 : 9.2; this.map.flyTo(d.coord, z, {duration:1.0}); }
  updateActive(){
    if(!this.markers) return;
    const sd = this.state.selectedIndex + 1;
    this.markers.forEach(o=>{ const el=o.m.getElement(); if(!el) return; const pin=el.querySelector('.np-pin'); if(!pin) return; pin.classList.toggle('active', o.days.indexOf(sd)>=0); });
  }

  setSheetRef = (el)=>{ this.sheetEl = el; if(el) requestAnimationFrame(()=>{ if(this.curTy==null) this.applySheet(this.state.sheetMode, false); }); };
  setStripRef = (el)=>{ this.stripEl = el; };
  setListRef = (el)=>{ this.listEl = el; };
  scrollListToToday(){
    if(!this.listEl) return;
    const tdy = this.computeToday();
    const card = this.listEl.querySelector('[data-day="'+(tdy.idx+1)+'"]');
    if(card) this.listEl.scrollTop = Math.max(0, card.offsetTop - 8);
  }
  snapTargets(){ const el=this.sheetEl; if(!el) return null; const H=el.parentNode.clientHeight; return {full:Math.round(H*0.06), mid:Math.round(H*0.46), peek:H-188, tab:H-70, H}; }
  applySheet(mode, animate){

    this.curTy = ty;
  }
  trackVel(e, reset){
    if(reset || !this._samples) this._samples = [];

  dragVelocity(){

  onSheetMove = (e)=>{

    this.trackVel(e);

    this.sheetEl.style.transform = 'translateY('+ty+'px)';
    this.curTy = ty;
  };
  onSheetUp = (e)=>{
    if(!this.dragging) return;
    this.dragging = false;
    if(this._dragMoved) this._dragEndT = Date.now();

  };
  // Pull-to-close: when the itinerary list is scrolled to the top, dragging
  // down grabs the whole sheet instead of rubber-banding the list.
  onListDown = (e)=>{

  onListMove = (e)=>{

        lp.baseTy = (this.curTy!=null) ? this.curTy : t.full;
        this.sheetEl.style.transition = 'none';
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_){}

    }
    if(e.cancelable) e.preventDefault();
    const t = this.snapTargets(); if(!t) return;
    let ty = lp.baseTy + Math.max(0, dy - 8);
    ty = Math.max(t.full, Math.min(t.H-150, ty));
    this.sheetEl.style.transform = 'translateY('+ty+'px)';
    this.curTy = ty;
  };
  onListUp = ()=>{
    const lp = this._lp; this._lp = null;
    if(!lp || !lp.pulling) return;
    this._dragEndT = Date.now();
    this.snapSheet();
  };
  stop = (e)=>{ e.stopPropagation(); };
  toggleSheet = ()=>{ if(this._dragEndT && Date.now()-this._dragEndT < 350) return; const next = this.state.sheetMode==='full' ? 'tab' : 'full'; this.applySheet(next, true); this.setState({sheetMode:next}); };
  centerStrip(){ if(!this.stripEl || this.state.sheetMode==='full') return; const cw=258; this.stripEl.scrollTo({left:Math.max(0, this.state.selectedIndex*cw - 70), behavior:'smooth'}); }

  openDetail = (i)=>{ if(this._dragEndT && Date.now()-this._dragEndT < 350) return; if(this.state.detailDay==null) this._detailFrom = this.state.sheetMode; this.setState({detailDay:i, selectedIndex:i, sheetMode:'full'}); };
  onBack = ()=>{ const back = this._detailFrom || 'peek'; this.setState({detailDay:null, sheetMode:back}); };
  setDetailCard = (el)=>{ this.detailCardEl = el; };
  onDetailDown = (e)=>{
    this._dStart = {x:e.clientX, y:e.clientY};

  };
  onDetailMove = (e)=>{

                  <div className="np-scroll" ref={V.setListRef} onPointerDown={V.onListDown} onPointerMove={V.onListMove} onPointerUp={V.onListUp} onPointerCancel={V.onListUp} style={st("flex:1;overflow-y:auto;padding:4px 14px calc(30px + env(safe-area-inset-bottom, 0px));overscroll-behavior:none;touch-action:pan-y;")}>
                    {V.days.map((day) => (
                      <div key={day.day} data-day={day.day} onClick={day.onOpen} style={st("border-radius:16px;border:1px solid "+day.cardBorder+";padding:13px;margin-bottom:11px;cursor:pointer;background:linear-gradient(180deg,#1a2b33,#15242b);box-shadow:0 8px 22px -16px rgba(0,0,0,.8);")}>
                        <div style={st("display:flex;align-items:center;gap:11px;")}>
                          <div style={st("flex:none;width:42px;height:42px;border-radius:12px;background:"+day.badgeBg+";border:1px solid "+day.badgeBorder+";display:flex;flex-direction:column;align-items:center;justify-content:center;")}>
                            <div style={st("font-size:7px;font-weight:600;letter-spacing:.4px;color:"+day.badgeMeta+";text-transform:uppercase;")}>Day</div>
                            <div style={st("font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:"+day.badgeNum+";line-height:1;")}>{day.day}</div>
                          </div>
                          <div style={st("flex:1;min-width:0;")}>
                            <div style={st("display:flex;align-items:center;gap:6px;")}>
                              <span style={st("font-size:10.5px;font-weight:600;color:#9fb4b6;letter-spacing:.2px;")}>{day.weekday} · {day.dateStr}</span>
                              <span style={st("display:flex;align-items:center;gap:3px;color:#85a7bd;font-size:10px;font-weight:600;")}>{day.skyIcon}{day.hi}° / {day.lo}°</span>
                              {day.isToday && (<span style={st("font-size:8px;font-weight:800;letter-spacing:.5px;color:#06181a;background:#4ECDC4;border-radius:4px;padding:1px 5px;text-transform:uppercase;")}>Today</span>)}
                              {day.modified && (<span style={st("width:7px;height:7px;border-radius:50%;background:#e09a5a;box-shadow:0 0 7px rgba(224,154,90,.7);")}></span>)}
                            </div>
                            <div style={st("display:flex;align-items:center;gap:5px;margin-top:4px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;color:#f0f7f6;line-height:1.15;")}>
                              <span style={st("white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;")}>{day.from}</span><span style={st("color:#4ECDC4;flex:none;display:inline-flex;")}>{V.arrowIconSm}</span><span style={st("white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;")}>{day.to}</span>
                            </div>
                          </div>
                          <span style={st("flex:none;color:#5f757a;")}>{V.chevronRightIcon}</span>
                        </div>
                        <div style={st("display:flex;align-items:center;gap:8px;margin-top:11px;")}>
                          <span style={st("flex:none;width:26px;height:26px;border-radius:7px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.18);display:flex;align-items:center;justify-content:center;color:#4ECDC4;")}>{day.topIcon}</span>
                          <div style={st("flex:1;min-width:0;font-size:11.5px;color:#c3d4d3;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;")}>{day.topActivity}</div>
                        </div>
                        <div style={st("display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:11px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);")}>
                          <div style={st("display:flex;align-items:center;gap:6px;")}>
                            <span style={st("display:flex;align-items:center;gap:5px;background:"+day.statusBg+";border:1px solid "+day.statusBorder+";color:"+day.statusColor+";border-radius:7px;padding:3px 7px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;")}><span style={st("width:5px;height:5px;border-radius:50%;background:"+day.statusColor+";")}></span>{day.statusLabel}</span>
                            <span style={st("display:flex;align-items:center;gap:4px;font-size:10.5px;color:#7f9498;font-weight:500;")}>{V.clockIconSm}{day.driveShort}</span>
                          </div>
                          <button onClick={day.onEdit} style={st("flex:none;display:flex;align-items:center;gap:5px;background:none;border:none;color:#7f9498;font-size:11px;font-weight:600;cursor:pointer;padding:0;")}>{V.pencilIconSm}Edit</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

              </div>
            </div>

            {V.editing && Dr && (
              <div className="np-card-anim" style={st("position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(5,11,14,.6);backdrop-filter:blur(3px);")}>
                <div onClick={V.closeEdit} style={st("flex:1;")}></div>
                <div style={st("background:linear-gradient(180deg,#16262e,#101e24);border-radius:26px 26px 0 0;border-top:1px solid rgba(255,255,255,.1);box-shadow:0 -20px 50px -10px rgba(0,0,0,.7);max-height:90%;display:flex;flex-direction:column;")}>
                  <div style={st("flex:none;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);")}>
                    <div>
                      <div style={st("font-size:9.5px;font-weight:700;letter-spacing:.7px;color:#4ECDC4;text-transform:uppercase;")}>Editing</div>
                      <div style={st("font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#f0f7f6;margin-top:2px;")}>{Dr.dayLabel}</div>
                    </div>
                    <button onClick={V.closeEdit} style={st("width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cfe0e0;display:flex;align-items:center;justify-content:center;cursor:pointer;")}>{V.xIcon}</button>
                  </div>
                  <div className="np-scroll" style={st("flex:1;overflow-y:auto;padding:16px 20px 18px;")}>
                    <div style={st("display:flex;gap:10px;")}>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>From</div>
                        <input value={Dr.from} onChange={Dr.onFrom} style={st(V.inputStyle)} />
                      </label>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>To</div>
                        <input value={Dr.to} onChange={Dr.onTo} style={st(V.inputStyle)} />
                      </label>
                    </div>
                    <div style={st("display:flex;gap:10px;margin-top:13px;")}>
                      <label style={st("flex:1.4;")}>
                        <div style={st(V.labelStyle)}>Driving time</div>
                        <input value={Dr.drivingTime} onChange={Dr.onDrive} style={st(V.inputStyle)} />
                      </label>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>Distance (km)</div>
                        <input type="number" value={Dr.drivingKm} onChange={Dr.onKm} style={st(V.inputStyle)} />
                      </label>
                    </div>
                    <label style={st("display:flex;align-items:center;gap:9px;margin-top:13px;cursor:pointer;")}>
                      <input type="checkbox" checked={Dr.ferry} onChange={Dr.onFerry} style={st("width:18px;height:18px;accent-color:#4ECDC4;")} />
                      <span style={st("font-size:13px;color:#d2e0df;font-weight:500;")}>This leg includes a ferry crossing</span>
                    </label>

                    <div style={st("margin-top:18px;display:flex;align-items:center;justify-content:space-between;")}>
                      <div style={st(V.labelStyle)}>Activities</div>
                      <button onClick={Dr.onAddAct} style={st("display:flex;align-items:center;gap:4px;background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.3);color:#7fe0d8;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;")}>{V.plusIconSm}Add activity</button>
                    </div>
                    <div style={st("margin-top:9px;display:flex;flex-direction:column;gap:10px;")}>
                      {Dr.acts.map((act, i) => (
                        <div key={i} style={st("background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px;")}>
                          <div style={st("display:flex;align-items:center;gap:8px;")}>
                            <input value={act.text} onChange={act.onText} placeholder="Activity title" style={st("flex:1;background:transparent;border:none;outline:none;color:#eef5f4;font-size:13.5px;font-weight:600;")} />
                            <button onClick={act.onRemove} style={st("flex:none;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#9fb4b6;display:flex;align-items:center;justify-content:center;cursor:pointer;")}>{V.trashIconSm}</button>
                          </div>
                          <div style={st("margin-top:9px;display:flex;align-items:center;gap:8px;")}>
                            <span style={st("flex:none;color:#7f9498;display:inline-flex;")}>{act.typeIconEl}</span>
                            <select value={act.type} onChange={act.onType} style={st("flex:1;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 9px;outline:none;color:#eaf2f1;font-size:12px;font-weight:500;cursor:pointer;")}>
                              {act.typeOptions.map((opt) => (<option key={opt.value} value={opt.value}>{opt.label}</option>))}
                            </select>
                          </div>
                          <textarea value={act.desc} onChange={act.onDesc} placeholder="Description (optional)" style={st("width:100%;margin-top:8px;min-height:38px;resize:vertical;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:12px;line-height:1.4;font-family:'Inter',sans-serif;")} />
                          {act.showMeta && (
                            <div style={st("display:flex;gap:8px;margin-top:8px;")}>
                              {act.showDistance && (<input type="number" value={act.hikeKm} onChange={act.onKm} placeholder="Distance (km)" style={st("flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />)}
                              {act.showDuration && (<input value={act.time} onChange={act.onTime} placeholder="Estimated time" style={st("flex:1.3;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />)}
                            </div>
                          )}
                          <div style={st("margin-top:9px;border-top:1px solid rgba(255,255,255,.06);padding-top:9px;")}>
                            {act.hasPlace && (
                              <div style={st("display:flex;align-items:center;gap:7px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.28);border-radius:9px;padding:7px 9px;")}>
                                <span style={st("flex:none;color:#4ECDC4;")}>{V.pinIcon}</span>
                                <span style={st("flex:1;min-width:0;font-size:11.5px;color:#cdeae7;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;")}>{act.place}</span>
                                <button onClick={act.onClear} style={st("flex:none;background:none;border:none;color:#7f9498;font-size:11px;font-weight:600;cursor:pointer;padding:2px 4px;")}>Clear</button>
                              </div>
                            )}
                            {act.noPlace && (
                              <div>
                                <div style={st("display:flex;gap:6px;")}>
                                  <input value={act.geoQ} onChange={act.onGeoQ} onKeyDown={act.onGeoKey} placeholder="Search a place, or paste a Maps link / lat,lng" style={st("flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />
                                  <button onClick={act.onFind} style={st("flex:none;display:flex;align-items:center;gap:5px;background:rgba(78,205,196,.14);border:1px solid rgba(78,205,196,.3);color:#7fe0d8;border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:600;cursor:pointer;")}>{V.searchIcon}Find</button>
                                </div>
                                {act.geoLoading && (<div style={st("font-size:11px;color:#7f9498;margin-top:7px;font-weight:500;")}>Searching OpenStreetMap…</div>)}
                                {act.hasResults && (
                                  <div style={st("margin-top:7px;display:flex;flex-direction:column;gap:5px;")}>
                                    {act.results.map((res, ri) => (
                                      <div key={ri} onClick={res.onPick} style={st("display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 9px;cursor:pointer;")}>
                                        <span style={st("flex:none;color:#9fb4b6;")}>{V.pinIconSm}</span>
                                        <div style={st("flex:1;min-width:0;")}>
                                          <div style={st("font-size:11.5px;color:#e3edec;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;")}>{res.label}</div>
                                          <div style={st("font-size:9.5px;color:#7f9498;font-weight:500;")}>{res.sub}</div>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                {act.noResults && (<div style={st("font-size:11px;color:#e08a5a;margin-top:7px;font-weight:500;")}>No matches — try a more specific name.</div>)}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div style={st("margin-top:18px;")}>
                      <div style={st(V.labelStyle)}>Accommodation</div>
                      <input value={Dr.accommodation} onChange={Dr.onAccom} style={st(V.inputStyle)} />
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Booking status</div>
                      <div style={st("display:flex;gap:8px;")}>
                        <button onClick={Dr.onBooked} style={st(Dr.bookedStyle)}>Booked</button>
                        <button onClick={Dr.onTbd} style={st(Dr.tbdStyle)}>TBD</button>
                        <button onClick={Dr.onFcfs} style={st(Dr.fcfsStyle)}>First come</button>
                      </div>
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Meals</div>
                      <div style={st("display:flex;flex-direction:column;gap:8px;")}>
                        <div style={st("display:flex;align-items:center;gap:8px;")}>
                          <span style={st("flex:none;width:72px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#7f9498;")}>Breakfast</span>
                          <input value={Dr.mealB} onChange={Dr.onMealB} placeholder="e.g. Bakery in town" style={st(V.inputStyle)} />
                        </div>
                        <div style={st("display:flex;align-items:center;gap:8px;")}>
                          <span style={st("flex:none;width:72px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#7f9498;")}>Lunch</span>
                          <input value={Dr.mealL} onChange={Dr.onMealL} placeholder="e.g. Packed for the trail" style={st(V.inputStyle)} />
                        </div>
                        <div style={st("display:flex;align-items:center;gap:8px;")}>
                          <span style={st("flex:none;width:72px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#7f9498;")}>Dinner</span>
                          <input value={Dr.mealD} onChange={Dr.onMealD} placeholder="e.g. Ægir Pub" style={st(V.inputStyle)} />
                        </div>
                      </div>
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Notes / vibe</div>
                      <textarea value={Dr.notes} onChange={Dr.onNotes} style={st(V.areaStyle)} />
                    </div>
                  </div>
                  <div style={st("flex:none;padding:13px 20px calc(22px + env(safe-area-inset-bottom, 0px));display:flex;gap:10px;border-top:1px solid rgba(255,255,255,.07);")}>
                    <button onClick={V.closeEdit} style={st("flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#cfe0e0;border-radius:13px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;")}>Cancel</button>
                    <button onClick={V.saveEdit} style={st("flex:1.6;background:#4ECDC4;border:none;color:#06181a;border-radius:13px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px -8px rgba(78,205,196,.55);")}>Save changes</button>
                  </div>
                </div>
              </div>
            )}

            {V.info.open && (
              <div className="np-card-anim" style={st("position:absolute;inset:0;z-index:21;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(5,11,14,.6);backdrop-filter:blur(3px);")}>
                <div onClick={V.info.onClose} style={st("flex:1;")}></div>
                <div style={st("background:linear-gradient(180deg,#16262e,#101e24);border-radius:26px 26px 0 0;border-top:1px solid rgba(255,255,255,.1);box-shadow:0 -20px 50px -10px rgba(0,0,0,.7);max-height:88%;display:flex;flex-direction:column;")}>
                  <div style={st("flex:none;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);")}>
                    <div>
                      <div style={st("font-size:9.5px;font-weight:700;letter-spacing:.7px;color:#4ECDC4;text-transform:uppercase;")}>Quick reference</div>
                      <div style={st("font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#f0f7f6;margin-top:2px;")}>🇳🇴 Norway cheat sheet</div>
                    </div>
                    <button onClick={V.info.onClose} style={st("width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cfe0e0;display:flex;align-items:center;justify-content:center;cursor:pointer;")}>{V.xIcon}</button>
                  </div>
                  <div className="np-scroll" style={st("flex:1;overflow-y:auto;padding:16px 20px calc(26px + env(safe-area-inset-bottom, 0px));")}>

                    <div style={st(V.labelStyle)}>Money · EUR ⇄ NOK</div>
                    <div style={st("display:flex;align-items:flex-end;gap:9px;")}>
                      <label style={st("flex:1;")}>
                        <div style={st("font-size:9px;font-weight:700;letter-spacing:.5px;color:#7f9498;margin-bottom:4px;")}>EUR €</div>
                        <input inputMode="decimal" value={V.info.eurVal} onChange={V.info.onFxEur} style={st(V.inputStyle)} />
                      </label>
                      <span style={st("flex:none;color:#4ECDC4;font-weight:700;padding-bottom:12px;")}>⇄</span>
                      <label style={st("flex:1;")}>
                        <div style={st("font-size:9px;font-weight:700;letter-spacing:.5px;color:#7f9498;margin-bottom:4px;")}>NOK kr</div>
                        <input inputMode="decimal" value={V.info.nokVal} onChange={V.info.onFxNok} style={st(V.inputStyle)} />
                      </label>
                    </div>
                    <div style={st("margin-top:7px;font-size:11px;color:#7f9498;font-weight:500;")}>{V.info.rateLabel} · {V.info.rateSource}</div>
                    <div style={st("display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;")}>
                      {V.info.quick.map((q, qi) => (
                        <span key={qi} style={st("background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 8px;font-size:10.5px;color:#cdd9d8;font-weight:600;")}>{q.kr} <span style={st("color:#7fe0d8;")}>{q.eur}</span></span>
                      ))}
                    </div>

                    <div style={st("margin-top:20px;")}>
                      <div style={st(V.labelStyle)}>Key phrases</div>
                      <div style={st("display:flex;flex-direction:column;")}>
                        {V.info.phrases.map((p, pi) => (
                          <div key={pi} style={st("display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);")}>
                            <span style={st("font-size:13.5px;color:#eef5f4;font-weight:600;")}>{p[0]}</span>
                            <span style={st("font-size:11.5px;color:#9fb4b6;font-weight:500;text-align:right;")}>{p[1]}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div style={st("margin-top:20px;")}>
                      <div style={st(V.labelStyle)}>Allergies — show this card</div>
                      <div style={st("background:rgba(224,90,90,.12);border:1.5px solid rgba(224,90,90,.45);border-radius:14px;padding:14px;")}>
                        <div style={st("font-size:15.5px;font-weight:700;color:#ffe3e0;line-height:1.4;")}>{V.info.allergyNo}</div>
                        <div style={st("font-size:13px;font-weight:600;color:#f2bdb8;margin-top:5px;line-height:1.4;")}>{V.info.allergyNo2}</div>
                        <div style={st("font-size:11px;color:#d99a94;margin-top:9px;line-height:1.4;font-style:italic;")}>{V.info.allergyEn}</div>
                      </div>
                      <div style={st("margin-top:12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7f9498;")}>Label words to watch</div>
                      <div style={st("margin-top:5px;display:flex;flex-direction:column;")}>
                        {V.info.words.map((w, wi) => (
                          <div key={wi} style={st("display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:5.5px 0;border-bottom:1px solid rgba(255,255,255,.05);")}>
                            <span style={st("font-size:12.5px;color:#f0d4d0;font-weight:600;")}>{w[0]}</span>
                            <span style={st("font-size:11px;color:#9fb4b6;font-weight:500;text-align:right;")}>{w[1]}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(NorwayApp, {defaultMapStyle:'satellite', units:'km', startExpanded:false})
);
</script>
</body>
</html>
