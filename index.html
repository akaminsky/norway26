/* Register the service worker and auto-reload when a new deploy activates.
   This is what makes the home-screen (PWA) app pick up updates instead of
   showing a stale cached version. */
(function () {
  if (!('serviceWorker' in navigator)) return;
  var hadController = !!navigator.serviceWorker.controller;
  var refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    // A new SW took control (new version). Reload once to run it — but not on the
    // very first install (when there was no controller yet), to avoid a needless reload.
    if (refreshing || !hadController) return;
    refreshing = true;
    location.reload();
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(function (reg) {
      reg.update();
      // Re-check for a new version whenever the app is reopened / refocused.
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update();
      });
    }).catch(function () {});
  });
})();
</script>

  const o = {};
  String(s || '').split(';').forEach(d => {
    if(!d.trim()) return;
    const i = d.indexOf(':'); if(i < 0) return;
    const k = d.slice(0, i).trim().replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = d.slice(i + 1).trim();
  });
  return o;
}

    const t = this.snapTargets(); if(!t) return;
    let ty = this.startTy + (e.clientY - this.startY);
    ty = Math.max(t.full, Math.min(t.H-150, ty));
    this.sheetEl.style.transform = 'translateY('+ty+'px)';
    this.curTy = ty;
  };
  onSheetUp = (e)=>{
    if(!this.dragging) return;
    this.dragging = false;
    const t = this.snapTargets(); if(!t) return;
    const opts = [['full',t.full],['mid',t.mid],['peek',t.peek]];
    let best = opts[0], bd = 1e9;
    opts.forEach(o=>{ const dd=Math.abs(o[1]-this.curTy); if(dd<bd){ bd=dd; best=o; } });
    this.applySheet(best[0], true);
    this.setState({sheetMode:best[0]});
  };
  stop = (e)=>{ e.stopPropagation(); };
  toggleSheet = ()=>{ const next = this.state.sheetMode==='full' ? 'peek' : 'full'; this.applySheet(next, true); this.setState({sheetMode:next}); };
  centerStrip(){ if(!this.stripEl || this.state.sheetMode==='full') return; const cw=258; this.stripEl.scrollTo({left:Math.max(0, this.state.selectedIndex*cw - 70), behavior:'smooth'}); }

  selectDay = (i)=>{ this.setState({selectedIndex:i}); };
  openDetail = (i)=>{ if(this.state.detailDay==null) this._detailFrom = this.state.sheetMode; this.setState({detailDay:i, selectedIndex:i, sheetMode:'full'}); };
  onBack = ()=>{ const back = this._detailFrom || 'peek'; this.setState({detailDay:null, sheetMode:back}); };
  onDetailDown = (e)=>{ this._dStart = {x:e.clientX, y:e.clientY}; };
  onDetailUp = (e)=>{
    if(!this._dStart) return;
    const dx = e.clientX - this._dStart.x, dy = e.clientY - this._dStart.y; this._dStart = null;
    if(Math.abs(dx) > 64 && Math.abs(dx) > Math.abs(dy)*1.4){
      const i = this.state.detailDay; if(i==null) return;
      if(dx < 0 && i < this.DEFAULTS.length-1) this.openDetail(i+1);
      else if(dx > 0 && i > 0) this.openDetail(i-1);
    }
  };
  onStripWheel = (e)=>{ if(!this.stripEl) return; if(Math.abs(e.deltaY) > Math.abs(e.deltaX)) this.stripEl.scrollLeft += e.deltaY; };

  persist(ov){ try { localStorage.setItem(this.KEY, JSON.stringify(ov)); } catch(_){}; this.setState({overrides:ov}); }
  saveTripLog = (day, val)=>{ const ov=Object.assign({}, this.state.overrides); const d=Object.assign({}, ov[day]||{}); d.tripLog=val; ov[day]=d; this.persist(ov); };
  addPhoto = (day, e)=>{
    const f = e.target.files && e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ const ov=Object.assign({}, this.state.overrides); const d=Object.assign({}, ov[day]||{}); d.photos=(d.photos||[]).concat([r.result]); ov[day]=d; this.persist(ov); };
    r.readAsDataURL(f); e.target.value='';
  };
  removePhoto = (day, pi)=>{ const ov=Object.assign({}, this.state.overrides); const d=Object.assign({}, ov[day]||{}); d.photos=(d.photos||[]).filter((_,i)=>i!==pi); ov[day]=d; this.persist(ov); };
  togglePhotos = (day)=>{ this.setState(s=>({photoOpenDay: s.photoOpenDay===day ? null : day})); };
  resetDay = (day)=>{
    const ov=Object.assign({}, this.state.overrides); const cur=ov[day];
    if(cur){ const keep={}; if(cur.photos && cur.photos.length) keep.photos=cur.photos; if(cur.tripLog) keep.tripLog=cur.tripLog; if(Object.keys(keep).length) ov[day]=keep; else delete ov[day]; }
    this.persist(ov);
  };

  openEdit = (i)=>{
    const d = this.mergedDays()[i];
    const draft = {day:d.day, from:d.from, to:d.to, drivingTime:d.drivingTime, drivingKm:d.drivingKm, ferry:!!d.ferry, accommodation:d.accommodation, status:d.status, notes:d.notes, tripLog:d.tripLog, activities:d.activities.map(a=>Object.assign({}, a))};
    this.setState({editing:true, editIndex:i, editDraft:draft, geo:{}});
  };
  closeEdit = ()=>{ this.setState({editing:false, editDraft:null, editIndex:null, geo:{}}); };
  setDraft(k, v){ this.setState(s=>({editDraft:Object.assign({}, s.editDraft, {[k]:v})})); }
  setAct(i, k, v){ this.setState(s=>{ const a=s.editDraft.activities.map((x,idx)=>idx===i?Object.assign({}, x, {[k]:v}):x); return {editDraft:Object.assign({}, s.editDraft, {activities:a})}; }); }
  removeAct(i){ this.setState(s=>({editDraft:Object.assign({}, s.editDraft, {activities:s.editDraft.activities.filter((_,idx)=>idx!==i)})})); }
  addAct(){ this.setState(s=>({editDraft:Object.assign({}, s.editDraft, {activities:s.editDraft.activities.concat([{type:'sightseeing', text:'', desc:'', hikeKm:0, time:''}])})})); }
  saveEdit = ()=>{
    const d = this.state.editDraft; if(!d) return;
    const ov = Object.assign({}, this.state.overrides);
    const cur = Object.assign({}, ov[d.day]||{});
    cur.from=d.from; cur.to=d.to; cur.drivingTime=d.drivingTime; cur.drivingKm=Number(d.drivingKm)||0; cur.ferry=!!d.ferry; cur.accommodation=d.accommodation; cur.status=d.status; cur.notes=d.notes; cur.tripLog=d.tripLog;
    cur.activities = d.activities.map(a=>{
      const type = a.type || this.inferType(a);
      const fields = this.typeMeta(type).fields;
      return {type, text:a.text, desc:a.desc||'', hikeKm:(fields.indexOf('distance')>=0)?(Number(a.hikeKm)||0):0, time:(fields.indexOf('duration')>=0)?(a.time||''):'', coord:(a.coord&&a.coord.length===2)?a.coord:null, place:a.place||''};
    });
    ov[d.day] = cur;
    this.persist(ov);
    this.closeEdit();
  };

  decorateDay(d, i){
    const sm = this.STATUS[d.status] || this.STATUS.tbd;
    const selected = i===this.state.selectedIndex;
    const wf = this.weatherFor(d);
    const sky = this.SKY[wf.sky] || this.SKY.cloudsun;
    const acts = d.activities.map(a=>{
      const meta = this.typeMeta(a.type);
      const bits = [];
      if(a.hikeKm && meta.fields.indexOf('distance')>=0) bits.push(this.fmtKm(a.hikeKm));
      if(a.time && meta.fields.indexOf('duration')>=0) bits.push(a.time);
      const aUrl = (a.coord&&a.coord.length===2) ? ('https://www.google.com/maps/search/?api=1&query='+a.coord[0]+','+a.coord[1]) : this.mapQuery(a.text);
      return {text:a.text, desc:a.desc||'', meta:bits.join(' · '), typeLabel:meta.label, iconEl:this.iconEl(meta.icon, 15), mapsUrl:aUrl, place:a.place||''};
    });
    const driveLabel = d.drivingKm>0 ? (this.fmtKm(d.drivingKm)+' · '+d.drivingTime) : 'Rest day — no driving';
    const driveShort = d.drivingKm>0 ? d.drivingTime : 'Rest day';
    const placeQ = /tbd/i.test(d.accommodation) ? (d.to.replace(/\s*area$/i,'') + ' camping') : d.accommodation.split(/\s[—–-]\s/)[0].trim();
    const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(placeQ + ' Norway');
    return Object.assign({}, d, {
      idx:i, selected, weekday:d.weekday, dateStr:d.date,
      hi:wf.hi, lo:wf.lo, skyIcon:this.iconEl(sky.icon, 13), skyLabel:wf.label, wxSource:(wf.source==='forecast'?'Live forecast':'Typical July'), wear:d.wear,
      detailTitle:'Day '+d.day+' · '+d.date, routeLabel:d.from+' → '+d.to,
      cardBorder: selected ? 'rgba(78,205,196,.5)' : 'rgba(255,255,255,.07)',
      badgeBg: selected ? 'rgba(78,205,196,.16)' : 'rgba(255,255,255,.05)',
      badgeBorder: selected ? 'rgba(78,205,196,.4)' : 'rgba(255,255,255,.08)',
      badgeMeta: selected ? '#7fe0d8' : '#7f9498',
      badgeNum: selected ? '#7fe0d8' : '#eaf2f1',
      statusLabel:sm.label, statusColor:sm.color, statusBg:sm.bg, statusBorder:sm.border,
      driveLabel, driveShort, mapsUrl,
      activities:acts,
      topActivity: d.activities[0] ? d.activities[0].text : '',
      topIcon: this.iconEl(d.activities[0] ? this.iconForAct(d.activities[0]) : 'navigation', 14),
      accom:d.accommodation,
      photoLabel: (d.photos.length ? ('Photo journal · '+d.photos.length) : 'Photo journal'),
      photoOpen: this.state.photoOpenDay===d.day,
      logKey: 'log-'+d.day+'-'+(d.tripLog?d.tripLog.length:0)+'-'+(d.modified?'m':'o'),
      photos: d.photos.map((src, pi)=>({src, imgEl:React.createElement('img',{src, style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}}), onRemove:()=>this.removePhoto(d.day, pi)})),
      onOpen: ()=>this.openDetail(i),
      hasPrev: i>0, hasNext: i<this.DEFAULTS.length-1,
      prevLabel: i>0 ? ('Day '+i) : 'Start of trip',
      nextLabel: i<this.DEFAULTS.length-1 ? ('Day '+(i+2)) : 'End of trip',
      prevBtnStyle: 'flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:11px;padding:11px;font-size:12.5px;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cfe0e0;cursor:pointer;' + (i>0?'':'opacity:.3;cursor:default;'),
      nextBtnStyle: 'flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:11px;padding:11px;font-size:12.5px;font-weight:600;border:1px solid rgba(78,205,196,.3);background:rgba(78,205,196,.12);color:#7fe0d8;cursor:pointer;' + (i<this.DEFAULTS.length-1?'':'opacity:.3;cursor:default;'),
      onPrev: ()=>{ if(i>0) this.openDetail(i-1); },
      onNext: ()=>{ if(i<this.DEFAULTS.length-1) this.openDetail(i+1); },
      onEdit: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.openEdit(i); },
      onReset: ()=>this.resetDay(d.day),
      onTogglePhotos: ()=>this.togglePhotos(d.day),
      onAddPhoto: (e)=>this.addPhoto(d.day, e),
      onTripLog: (e)=>this.saveTripLog(d.day, e.target.value)
    });
  }

  renderVals(){
    const ac = this.accent();

    const selIdx = this.state.selectedIndex;
    const t = merged[selIdx] || merged[0];
    const tWf = this.weatherFor(t);
    const tSky = this.SKY[tWf.sky] || this.SKY.cloudsun;
    const today = {
      dayNum:t.day, weekday:t.weekday, dateStr:t.date, from:t.from, to:t.to,

    const inputStyle = 'width:100%;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 12px;outline:none;color:#eaf2f1;font-size:13.5px;font-weight:500;';
    const areaStyle = 'width:100%;min-height:58px;resize:vertical;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 12px;outline:none;color:#eaf2f1;font-size:13px;line-height:1.45;font-family:Inter,sans-serif;';

    let draft = null;
    const ed = this.state.editDraft;
    if(ed){
      const segChoose = (on)=> on ? 'flex:1;border:1px solid '+ac+';background:rgba(78,205,196,.16);color:#7fe0d8;border-radius:10px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer;' : 'flex:1;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#9fb4b6;border-radius:10px;padding:10px;font-size:12.5px;font-weight:600;cursor:pointer;';
      const typeOptions = this.TYPES.map(tp=>({value:tp.key, label:tp.label}));
      draft = {
        dayLabel:'Day '+ed.day+' · '+(this.DEFAULTS[ed.day-1].date),

        onFrom:(e)=>this.setDraft('from', e.target.value),
        onTo:(e)=>this.setDraft('to', e.target.value),
        onDrive:(e)=>this.setDraft('drivingTime', e.target.value),
        onKm:(e)=>this.setDraft('drivingKm', e.target.value),
        onFerry:(e)=>this.setDraft('ferry', e.target.checked),
        onAccom:(e)=>this.setDraft('accommodation', e.target.value),
        onNotes:(e)=>this.setDraft('notes', e.target.value),
        onLog:(e)=>this.setDraft('tripLog', e.target.value),
        onBooked:()=>this.setDraft('status','booked'),
        onTbd:()=>this.setDraft('status','tbd'),
        onFcfs:()=>this.setDraft('status','fcfs'),
        bookedStyle:segChoose(ed.status==='booked'),
        tbdStyle:segChoose(ed.status==='tbd'),
        fcfsStyle:segChoose(ed.status==='fcfs'),
        onAddAct:()=>this.addAct(),
        acts: ed.activities.map((a, i)=>{
          const type = a.type || this.inferType(a);
          const fields = this.typeMeta(type).fields;
          const gs = this.state.geo[i] || {};
          const gq = (gs.q!=null) ? gs.q : a.text;
          const results = gs.results;
          const showDistance = fields.indexOf('distance')>=0;
          const showDuration = fields.indexOf('duration')>=0;
          return {
            text:a.text, desc:a.desc||'',
            type, typeOptions, typeIconEl:this.iconEl(this.typeMeta(type).icon, 15),
            showMeta: showDistance||showDuration, showDistance, showDuration,
            hikeKm:(a.hikeKm||a.hikeKm===0)?a.hikeKm:'', time:a.time||'',
            onText:(e)=>this.setAct(i,'text',e.target.value),
            onDesc:(e)=>this.setAct(i,'desc',e.target.value),
            onType:(e)=>this.setAct(i,'type',e.target.value),
            onKm:(e)=>this.setAct(i,'hikeKm',e.target.value),
            onTime:(e)=>this.setAct(i,'time',e.target.value),
            onRemove:()=>this.removeAct(i),
            hasPlace: !!(a.coord), noPlace: !(a.coord), place:a.place||'',
            geoQ:gq, geoLoading:!!gs.loading,
            hasResults:!!(results&&results.length), noResults:!!(results&&results.length===0&&!gs.loading),
            onGeoQ:(e)=>this.onGeoQ(i, e.target.value),
            onGeoKey:(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.doFind(i, a.text); } },
            onFind:()=>this.doFind(i, a.text),
            onClear:()=>this.clearPlace(i),
            results:(results||[]).map(r=>({label:r.name, sub:r.lat.toFixed(3)+', '+r.lon.toFixed(3), onPick:()=>this.attachPlace(i, r.lat, r.lon, r.name)}))
          };

      };
    }

    return {
      days, today, detail, detailOpen, notDetail:!detailOpen,
      listOpen: this.state.sheetMode==='full' && !detailOpen,
      stripOpen: this.state.sheetMode!=='full' && !detailOpen,
      online:this.state.online, offline:!this.state.online,
      wifiOffIcon:this.iconEl('wifiOff',10),

      plusIcon:this.iconEl('plus',16), plusIconSm:this.iconEl('plus',13), xIcon:this.iconEl('x',16), xIconSm:this.iconEl('x',12),

      toggleSheet:this.toggleSheet, stop:this.stop, onBack:this.onBack,

      terrBtnStyle: segBase + (!satOn ? 'background:'+ac+';color:#06181a;' : 'background:transparent;color:#9fb4b6;'),
      editing:this.state.editing, draft, labelStyle, inputStyle, areaStyle,
      closeEdit:this.closeEdit, saveEdit:this.saveEdit
    };
  }

                  <div style={st("min-width:0;")}>
                    <div style={st("display:flex;align-items:center;gap:7px;flex-wrap:wrap;")}>

                    </div>
                    <div style={st("margin-top:7px;display:flex;align-items:center;gap:7px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18.5px;color:#f2f8f7;line-height:1.05;flex-wrap:wrap;")}>

                        </div>
                        <div style={st("display:flex;align-items:center;gap:8px;margin-top:11px;")}>
                          <span style={st("flex:none;width:26px;height:26px;border-radius:7px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.18);display:flex;align-items:center;justify-content:center;color:#4ECDC4;")}>{day.topIcon}</span>
                          <div style={st("flex:1;min-width:0;font-size:11.5px;color:#c3d4d3;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;")}>{day.topActivity}</div>
                        </div>
                        <div style={st("display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.06);")}>
                          <span style={st("display:flex;align-items:center;gap:5px;background:"+day.statusBg+";border:1px solid "+day.statusBorder+";color:"+day.statusColor+";border-radius:7px;padding:3px 7px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;")}><span style={st("width:5px;height:5px;border-radius:50%;background:"+day.statusColor+";")}></span>{day.statusLabel}</span>
                          <span style={st("flex:none;display:flex;align-items:center;gap:4px;color:#7fe0d8;font-size:11px;font-weight:600;")}>Open {V.chevronRightIcon}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {V.editing && Dr && (
              <div className="np-card-anim" style={st("position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(5,11,14,.6);backdrop-filter:blur(3px);")}>
                <div onClick={V.closeEdit} style={st("flex:1;")}></div>
                <div style={st("background:linear-gradient(180deg,#16262e,#101e24);border-radius:26px 26px 0 0;border-top:1px solid rgba(255,255,255,.1);box-shadow:0 -20px 50px -10px rgba(0,0,0,.7);max-height:90%;display:flex;flex-direction:column;")}>
                  <div style={st("flex:none;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);")}>
                    <div>
                      <div style={st("font-size:9.5px;font-weight:700;letter-spacing:.7px;color:#4ECDC4;text-transform:uppercase;")}>Editing</div>
                      <div style={st("font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#f0f7f6;margin-top:2px;")}>{Dr.dayLabel}</div>
                    </div>
                    <button onClick={V.closeEdit} style={st("width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#cfe0e0;display:flex;align-items:center;justify-content:center;cursor:pointer;")}>{V.xIcon}</button>
                  </div>
                  <div className="np-scroll" style={st("flex:1;overflow-y:auto;padding:16px 20px 18px;")}>
                    <div style={st("display:flex;gap:10px;")}>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>From</div>
                        <input value={Dr.from} onChange={Dr.onFrom} style={st(V.inputStyle)} />
                      </label>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>To</div>
                        <input value={Dr.to} onChange={Dr.onTo} style={st(V.inputStyle)} />
                      </label>
                    </div>
                    <div style={st("display:flex;gap:10px;margin-top:13px;")}>
                      <label style={st("flex:1.4;")}>
                        <div style={st(V.labelStyle)}>Driving time</div>
                        <input value={Dr.drivingTime} onChange={Dr.onDrive} style={st(V.inputStyle)} />
                      </label>
                      <label style={st("flex:1;")}>
                        <div style={st(V.labelStyle)}>Distance (km)</div>
                        <input type="number" value={Dr.drivingKm} onChange={Dr.onKm} style={st(V.inputStyle)} />
                      </label>
                    </div>
                    <label style={st("display:flex;align-items:center;gap:9px;margin-top:13px;cursor:pointer;")}>
                      <input type="checkbox" checked={Dr.ferry} onChange={Dr.onFerry} style={st("width:18px;height:18px;accent-color:#4ECDC4;")} />
                      <span style={st("font-size:13px;color:#d2e0df;font-weight:500;")}>This leg includes a ferry crossing</span>
                    </label>

                    <div style={st("margin-top:18px;display:flex;align-items:center;justify-content:space-between;")}>
                      <div style={st(V.labelStyle)}>Activities</div>
                      <button onClick={Dr.onAddAct} style={st("display:flex;align-items:center;gap:4px;background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.3);color:#7fe0d8;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;")}>{V.plusIconSm}Add activity</button>
                    </div>
                    <div style={st("margin-top:9px;display:flex;flex-direction:column;gap:10px;")}>
                      {Dr.acts.map((act, i) => (
                        <div key={i} style={st("background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px;")}>
                          <div style={st("display:flex;align-items:center;gap:8px;")}>
                            <input value={act.text} onChange={act.onText} placeholder="Activity title" style={st("flex:1;background:transparent;border:none;outline:none;color:#eef5f4;font-size:13.5px;font-weight:600;")} />
                            <button onClick={act.onRemove} style={st("flex:none;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#9fb4b6;display:flex;align-items:center;justify-content:center;cursor:pointer;")}>{V.trashIconSm}</button>
                          </div>
                          <div style={st("margin-top:9px;display:flex;align-items:center;gap:8px;")}>
                            <span style={st("flex:none;color:#7f9498;display:inline-flex;")}>{act.typeIconEl}</span>
                            <select value={act.type} onChange={act.onType} style={st("flex:1;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 9px;outline:none;color:#eaf2f1;font-size:12px;font-weight:500;cursor:pointer;")}>
                              {act.typeOptions.map((opt) => (<option key={opt.value} value={opt.value}>{opt.label}</option>))}
                            </select>
                          </div>
                          <textarea value={act.desc} onChange={act.onDesc} placeholder="Description (optional)" style={st("width:100%;margin-top:8px;min-height:38px;resize:vertical;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:12px;line-height:1.4;font-family:'Inter',sans-serif;")} />
                          {act.showMeta && (
                            <div style={st("display:flex;gap:8px;margin-top:8px;")}>
                              {act.showDistance && (<input type="number" value={act.hikeKm} onChange={act.onKm} placeholder="Distance (km)" style={st("flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />)}
                              {act.showDuration && (<input value={act.time} onChange={act.onTime} placeholder="Estimated time" style={st("flex:1.3;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />)}
                            </div>
                          )}
                          <div style={st("margin-top:9px;border-top:1px solid rgba(255,255,255,.06);padding-top:9px;")}>
                            {act.hasPlace && (
                              <div style={st("display:flex;align-items:center;gap:7px;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.28);border-radius:9px;padding:7px 9px;")}>
                                <span style={st("flex:none;color:#4ECDC4;")}>{V.pinIcon}</span>
                                <span style={st("flex:1;min-width:0;font-size:11.5px;color:#cdeae7;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;")}>{act.place}</span>
                                <button onClick={act.onClear} style={st("flex:none;background:none;border:none;color:#7f9498;font-size:11px;font-weight:600;cursor:pointer;padding:2px 4px;")}>Clear</button>
                              </div>
                            )}
                            {act.noPlace && (
                              <div>
                                <div style={st("display:flex;gap:6px;")}>
                                  <input value={act.geoQ} onChange={act.onGeoQ} onKeyDown={act.onGeoKey} placeholder="Search a place, or paste a Maps link / lat,lng" style={st("flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 9px;outline:none;color:#cfe0e0;font-size:11.5px;")} />
                                  <button onClick={act.onFind} style={st("flex:none;display:flex;align-items:center;gap:5px;background:rgba(78,205,196,.14);border:1px solid rgba(78,205,196,.3);color:#7fe0d8;border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:600;cursor:pointer;")}>{V.searchIcon}Find</button>
                                </div>
                                {act.geoLoading && (<div style={st("font-size:11px;color:#7f9498;margin-top:7px;font-weight:500;")}>Searching OpenStreetMap…</div>)}
                                {act.hasResults && (
                                  <div style={st("margin-top:7px;display:flex;flex-direction:column;gap:5px;")}>
                                    {act.results.map((res, ri) => (
                                      <div key={ri} onClick={res.onPick} style={st("display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 9px;cursor:pointer;")}>
                                        <span style={st("flex:none;color:#9fb4b6;")}>{V.pinIconSm}</span>
                                        <div style={st("flex:1;min-width:0;")}>
                                          <div style={st("font-size:11.5px;color:#e3edec;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;")}>{res.label}</div>
                                          <div style={st("font-size:9.5px;color:#7f9498;font-weight:500;")}>{res.sub}</div>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                {act.noResults && (<div style={st("font-size:11px;color:#e08a5a;margin-top:7px;font-weight:500;")}>No matches — try a more specific name.</div>)}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div style={st("margin-top:18px;")}>
                      <div style={st(V.labelStyle)}>Accommodation</div>
                      <input value={Dr.accommodation} onChange={Dr.onAccom} style={st(V.inputStyle)} />
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Booking status</div>
                      <div style={st("display:flex;gap:8px;")}>
                        <button onClick={Dr.onBooked} style={st(Dr.bookedStyle)}>Booked</button>
                        <button onClick={Dr.onTbd} style={st(Dr.tbdStyle)}>TBD</button>
                        <button onClick={Dr.onFcfs} style={st(Dr.fcfsStyle)}>First come</button>
                      </div>
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Notes / vibe</div>
                      <textarea value={Dr.notes} onChange={Dr.onNotes} style={st(V.areaStyle)} />
                    </div>
                    <div style={st("margin-top:13px;")}>
                      <div style={st(V.labelStyle)}>Trip log</div>
                      <textarea value={Dr.tripLog} onChange={Dr.onLog} placeholder="What actually happened…" style={st(V.areaStyle)} />
                    </div>
                  </div>
                  <div style={st("flex:none;padding:13px 20px calc(22px + env(safe-area-inset-bottom, 0px));display:flex;gap:10px;border-top:1px solid rgba(255,255,255,.07);")}>
                    <button onClick={V.closeEdit} style={st("flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#cfe0e0;border-radius:13px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;")}>Cancel</button>
                    <button onClick={V.saveEdit} style={st("flex:1.6;background:#4ECDC4;border:none;color:#06181a;border-radius:13px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px -8px rgba(78,205,196,.55);")}>Save changes</button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(NorwayApp, {defaultMapStyle:'satellite', units:'km', startExpanded:false})
);
</script>
</body>
</html>
